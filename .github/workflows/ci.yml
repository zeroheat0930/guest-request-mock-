name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api-build:
    name: api_server build & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify (compile + tests)
        working-directory: api_server
        run: mvn -B -q -DskipTests=false verify
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: concierge-api-jar
          path: api_server/target/*.jar
          if-no-files-found: error

  vue-build:
    name: vue_client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue_client/package-lock.json
      - name: Install deps
        working-directory: vue_client
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: vue_client
        env:
          VITE_API_BASE: /api
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: concierge-vue-dist
          path: vue_client/dist/**
          if-no-files-found: error

  docker-images:
    name: Build container images
    needs: [api-build, vue-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: ./api_server
          file: ./api_server/Dockerfile
          push: false
          tags: concierge-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: ./vue_client
          file: ./vue_client/Dockerfile
          push: false
          tags: concierge-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
