server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: concierge-api
  profiles:
    default: dev

logging:
  level:
    com.daol.concierge: DEBUG

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001
  endpoint: https://api.anthropic.com/v1/messages
  version: '2023-06-01'

concierge:
  # 요청 디스패처 선택: internal(no-op, 기본) | daol(사내 PMS KOK 이벤트) | external(외부 REST, stub)
  dispatcher: ${CONCIERGE_DISPATCHER:internal}

pms:
  # 회사 PMS 키오스크 이벤트 브릿지 설정. dispatcher=daol 일 때만 사용.
  # PMS 측: SecurityConfig.ignorePagesPost 에 /api/mkiosk/event 추가 + CcService.setKokEvent userId fallback 필요.
  base-url: ${PMS_BASE_URL:http://localhost:8090}
  prop-cd: ${PMS_PROP_CD:}
  cmpx-cd: ${PMS_CMPX_CD:}
  kok-cd: ${PMS_KOK_CD:CONCIERGE}

admin:
  # 관리자 API (X-Admin-Token) 패스워드. 비어 있으면 /api/concierge/admin/** 는 503.
  password: ${CONCIERGE_ADMIN_PW:}

nearby:
  # 주변 정보 제공자: mock(기본, 하드코딩 샘플) | kakao(실제 카카오 로컬 API)
  provider: ${NEARBY_PROVIDER:mock}
  default-radius-m: ${NEARBY_RADIUS_M:1000}

kakao:
  # Kakao Developers REST API 키. nearby.provider=kakao 일 때만 필요.
  rest-api-key: ${KAKAO_REST_API_KEY:}

jwt:
  # 개발용 고정 시크릿. 프로덕션에선 반드시 JWT_SECRET 환경변수로 주입.
  secret: ${JWT_SECRET:dev-only-secret-please-change-in-production-32bytes-min!!}
  # 발급 후 유효 시간(시간 단위). 실제 만료는 이 값과 예약 체크아웃 일자 중 빠른 쪽.
  hours-valid: 72

---
# ───────── dev (기본) ─────────
# H2 파일 모드 + MySQL/MariaDB 호환 모드 + JPA 자동 스키마 생성 + 시드 데이터는 SeedDataRunner 가 주입
# 실제 운영 DB 는 MariaDB(회사 PMS 스택) 라 H2 MODE=MYSQL 로 SQL 문법 차이를 최소화.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/concierge-dev;AUTO_SERVER=TRUE;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

---
# ───────── prod (MariaDB) ─────────
# 회사 PMS 와 동일한 MariaDB 사용. SPRING_PROFILES_ACTIVE=prod 로 기동, 접속정보는 환경변수로.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/concierge?useUnicode=true&characterEncoding=utf8}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER:concierge}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      # 상용화 전에는 Flyway/Liquibase 마이그레이션으로 교체 권장 (PMS 규칙: DDL 파일 금지라
      # 실제 회사 이식 시엔 사내 DDL 변경 절차 경유).
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

---
# ───────── test (H2 인메모리, MariaDB/MySQL 호환 모드) ─────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:concierge-test;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
