services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: concierge
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-concierge-dev-pw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 호스트로 5432 를 노출하지 않는다 — compose 내부 DNS(postgres:5432) 로만 접근하면 충분하고
    # 실수로 공용 네트워크에 DB 를 여는 사고 차단.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concierge -d concierge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api_server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/concierge
      DB_USER: concierge
      DB_PASSWORD: ${DB_PASSWORD:-concierge-dev-pw}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-compose-dev-secret-at-least-32-bytes-long-please-change}
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./vue_client
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  pgdata:
