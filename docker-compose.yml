services:
  mariadb:
    # 회사 PMS 스택과 동일한 MariaDB 사용
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: concierge
      MARIADB_USER: concierge
      MARIADB_PASSWORD: ${DB_PASSWORD:-concierge-dev-pw}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-concierge-root-dev-pw}
    volumes:
      - mariadbdata:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    # 호스트로 3306 을 노출하지 않는다 — compose 내부 DNS(mariadb:3306) 로만 접근하면 충분하고
    # 실수로 공용 네트워크에 DB 를 여는 사고 차단.
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --su-mysql --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api_server
      dockerfile: Dockerfile
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mariadb://mariadb:3306/concierge?useUnicode=true&characterEncoding=utf8
      DB_USER: concierge
      DB_PASSWORD: ${DB_PASSWORD:-concierge-dev-pw}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-compose-dev-secret-at-least-32-bytes-long-please-change}
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./vue_client
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  mariadbdata:
